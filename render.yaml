services:
  - type: web
    name: bookstore-api
    runtime: docker
    dockerfilePath: ./api/Dockerfile
    plan: free
    envVars:
      # Base de datos (Render la conecta automáticamente)
      - key: DB_HOST
        fromDatabase:
          name: bookstore-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: bookstore-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: bookstore-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: bookstore-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: bookstore-db
          property: password
      # Secretos — se configuran manualmente en Render dashboard
      - key: JWT_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: PAYPAL_CLIENT_ID
        sync: false
      - key: PAYPAL_CLIENT_SECRET
        sync: false
      # Variables fijas
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: CORS_ALLOWED_ORIGINS
        value: https://tu-sitio.netlify.app  # cambia por tu URL de Netlify
      - key: UPLOAD_DIR
        value: uploads
      - key: SERVER_PORT
        value: 8084
      - key: PAYPAL_BASE_URL
        value: https://api-m.sandbox.paypal.com

# IMPORTANTE: pgvector no está disponible en el plan free de Render.
# Alternativa gratuita: Supabase (https://supabase.com) que sí incluye pgvector.
databases:
  - name: bookstore-db
    plan: free
    databaseName: bookstore_ai_db
    user: postgres
