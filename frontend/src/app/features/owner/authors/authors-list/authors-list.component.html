<div class="page-container">
  <mat-card>
    <mat-card-header>
      <mat-card-title>
        Autores ({{ totalElements() }})
      </mat-card-title>
      <span class="spacer"></span>
      <button mat-raised-button color="primary" routerLink="/owner/authors/new">
        <mat-icon>add</mat-icon> Nuevo Autor
      </button>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="searchForm">
        <mat-form-field appearance="outline" class="filter-field">
          <mat-label>Buscar por nombre</mat-label>
          <input matInput formControlName="search" (keyup.enter)="onSearch()" placeholder="Filtrar...">
          <button matSuffix mat-icon-button (click)="onSearch()">
            <mat-icon>search</mat-icon>
          </button>
        </mat-form-field>
      </form>

      <table mat-table [dataSource]="authors()" class="full-width">
        <ng-container matColumnDef="id">
          <th mat-header-cell *matHeaderCellDef>ID</th>
          <td mat-cell *matCellDef="let author">{{ author.id }}</td>
        </ng-container>

        <ng-container matColumnDef="firstName">
          <th mat-header-cell *matHeaderCellDef>Nombre</th>
          <td mat-cell *matCellDef="let author">{{ author.firstName }}</td>
        </ng-container>

        <ng-container matColumnDef="lastName">
          <th mat-header-cell *matHeaderCellDef>Apellido</th>
          <td mat-cell *matCellDef="let author">{{ author.lastName }}</td>
        </ng-container>

        <ng-container matColumnDef="nationality">
          <th mat-header-cell *matHeaderCellDef>Nacionalidad</th>
          <td mat-cell *matCellDef="let author">{{ author.nationality }}</td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>Acciones</th>
          <td mat-cell *matCellDef="let author">
            <button mat-icon-button color="primary" [routerLink]="['/owner/authors/edit', author.id]">
              <mat-icon>edit</mat-icon>
            </button>
            <button mat-icon-button color="warn" (click)="deleteAuthor(author.id)">
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>

      @if (authors().length === 0) {
        <p class="empty-state">No se encontraron autores.</p>
      }

      <mat-paginator
        [length]="totalElements()"
        [pageSize]="pageSize()"
        [pageIndex]="pageIndex()"
        [pageSizeOptions]="[5, 10, 25]"
        (page)="onPageChange($event)"
        showFirstLastButtons>
      </mat-paginator>
    </mat-card-content>
  </mat-card>
</div>
