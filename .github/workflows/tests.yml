name: Tests

# Se ejecuta en cada push y en cada Pull Request hacia main
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Obtener código
        uses: actions/checkout@v4

      - name: Instalar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven          # cachea las dependencias Maven para que sea más rápido

      - name: Correr tests
        run: mvn test
        working-directory: api  # los tests están en la carpeta api/
