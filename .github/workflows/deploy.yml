name: Deploy

# Se ejecuta solo cuando se hace push a main (rama de producción)
on:
  push:
    branches: [ main ]

jobs:

  # ── Deploy API → Render ──────────────────────────────────────
  deploy-api:
    name: Deploy API to Render
    runs-on: ubuntu-latest
    steps:
      - name: Disparar deploy en Render
        # Render tiene una URL especial (deploy hook) que al llamarla
        # hace build y deploy automáticamente del Dockerfile de la API
        run: curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

  # ── Deploy Frontend → Netlify ────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend to Netlify
    runs-on: ubuntu-latest
    steps:
      - name: Obtener código
        uses: actions/checkout@v4

      - name: Instalar Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build Angular (producción)
        run: npm ci && npx ng build --configuration production
        working-directory: frontend

      - name: Deploy a Netlify
        uses: netlify/actions/cli@master
        with:
          args: deploy --dir=frontend/dist/frontend/browser --prod
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
